task_id: tie_rope_knot_v1
instruction_templates:
  - tie a simple overhand knot in the rope
  - make an overhand knot with the rope on the table
  - pick up the rope and tie a single knot
  - form a loop and pull the end through to tie a knot
embodiment: ALOHA
workspace:
  x: [0.20, 0.68]
  y: [-0.30, 0.30]
  z: [0.00, 0.25]
objects:
  rope:
    type: deformable
    length_m: 0.30
    radius_m: 0.004
    segment_count: 32
    material:
      stiffness: 0.12
      damping: 0.05
      friction: [0.7, 1.3]
    spawn_xy_range:
      x: [0.30, 0.58]
      y: [-0.18, 0.18]
    initial_layout: roughly_straight
observations:
  - front_rgb
  - wrist_rgb
  - joint_positions
  - joint_velocities
  - gripper_state
  - language_instruction
actions:
  type: ee_delta_plus_gripper
  dims: 7
success:
  description: stable overhand knot held for consecutive frames
  required_consecutive_frames: 15
  constraints:
    knot_quality: true
    loop_closure: true
    stability_frames: 15
reward_terms:
  rope_grasp: 0.6
  loop_formation: 1.2
  end_thread_through_loop: 1.5
  knot_tightening: 1.0
  terminal_knot_success: 12.0
  rope_drop_penalty: -1.0
  collision_penalty: -1.5
  excessive_stretch_penalty: -0.8
  jerk_penalty: -0.1
  timeout_penalty: -0.6
domain_randomization:
  lighting: true
  textures: true
  camera_jitter: true
  friction_range: [0.6, 1.4]
  latency_ms_range: [0, 80]
  rope_length_variation_pct: 15
  rope_stiffness_range: [0.08, 0.18]
  rope_color_randomize: true
curriculum:
  - stage: easy
    description: centered rope, low spawn variance, fixed stiffness
    spawn_variance: low
    rope_stiffness: fixed
    time_limit_scale: 1.5
  - stage: medium
    description: variable spawn position and rope stiffness
    spawn_variance: medium
    rope_stiffness: randomized
    time_limit_scale: 1.2
  - stage: hard
    description: maximum spawn variance, stiffness, and added clutter
    spawn_variance: high
    rope_stiffness: randomized
    distractor_objects: 2
    time_limit_scale: 1.0
